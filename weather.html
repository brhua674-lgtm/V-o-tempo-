<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID WEATHER</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #000000;
    --abyss: #030308;
    --shadow: #0a0a14;
    --dim: #12121e;
    --blood: #8b0000;
    --crimson: #c41230;
    --ember: #ff2244;
    --bone: #d4c8b0;
    --ash: #8a8070;
    --fog: #3a3550;
    --mist: #1e1a2e;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--void);
    color: var(--bone);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(60,30,80,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(196,18,48,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .grain {
    position: fixed;
    inset: 0;
    opacity: 0.04;
    pointer-events: none;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    animation: grainShift 0.5s steps(1) infinite;
  }

  @keyframes grainShift {
    0% { transform: translate(0,0); }
    25% { transform: translate(-3px,2px); }
    50% { transform: translate(2px,-1px); }
    75% { transform: translate(-1px,3px); }
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 60px;
    animation: fadeDown 1.2s ease forwards;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .title-symbol {
    font-size: 11px;
    letter-spacing: 12px;
    text-transform: uppercase;
    color: var(--blood);
    font-family: 'Crimson Text', serif;
    margin-bottom: 8px;
    display: block;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--bone);
    text-shadow: 0 0 60px rgba(196,18,48,0.4), 0 0 120px rgba(139,0,0,0.2);
    line-height: 1;
  }

  h1 span {
    color: var(--crimson);
    text-shadow: 0 0 40px rgba(255,34,68,0.6);
  }

  .subtitle {
    font-size: 13px;
    letter-spacing: 8px;
    color: var(--ash);
    text-transform: uppercase;
    margin-top: 12px;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blood), transparent);
    margin: 20px auto 0;
  }

  .search-section {
    width: 100%;
    max-width: 560px;
    margin-bottom: 50px;
    animation: fadeUp 1s ease 0.3s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .search-wrapper {
    position: relative;
    display: flex;
    gap: 0;
    border: 1px solid rgba(139,0,0,0.4);
    background: rgba(3,3,8,0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(139,0,0,0.1), inset 0 0 30px rgba(0,0,0,0.5);
  }

  .search-wrapper::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border: 1px solid rgba(196,18,48,0.0);
    transition: border-color 0.3s;
    pointer-events: none;
  }

  .search-wrapper:focus-within::before {
    border-color: rgba(196,18,48,0.3);
  }

  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 18px 24px;
    color: var(--bone);
    font-family: 'Crimson Text', serif;
    font-size: 17px;
    letter-spacing: 1px;
  }

  input::placeholder {
    color: var(--fog);
    font-style: italic;
  }

  button {
    background: var(--blood);
    border: none;
    padding: 18px 28px;
    color: var(--bone);
    font-family: 'Cinzel Decorative', serif;
    font-size: 11px;
    letter-spacing: 3px;
    cursor: crosshair;
    transition: background 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
  }

  button:hover {
    background: var(--crimson);
    box-shadow: 0 0 20px rgba(196,18,48,0.4);
  }

  button:active {
    background: var(--ember);
  }

  .error-msg {
    text-align: center;
    color: var(--ember);
    font-style: italic;
    font-size: 15px;
    margin-top: 16px;
    letter-spacing: 1px;
    animation: fadeUp 0.4s ease;
  }

  .weather-card {
    width: 100%;
    max-width: 800px;
    display: none;
    animation: revealCard 0.8s ease forwards;
  }

  @keyframes revealCard {
    from { opacity: 0; transform: translateY(30px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .weather-card.visible {
    display: block;
  }

  .card-main {
    border: 1px solid rgba(139,0,0,0.3);
    background: rgba(3,3,8,0.95);
    padding: 50px 40px;
    position: relative;
    overflow: hidden;
  }

  .card-main::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blood), var(--crimson), var(--blood), transparent);
  }

  .card-main::after {
    content: '';
    position: absolute;
    bottom: -100px; right: -100px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(139,0,0,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .city-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    letter-spacing: 4px;
    color: var(--bone);
    text-shadow: 0 0 40px rgba(196,18,48,0.3);
    margin-bottom: 4px;
  }

  .country-date {
    color: var(--ash);
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .main-info {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .temp-block {
    display: flex;
    flex-direction: column;
  }

  .temperature {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(4rem, 10vw, 7rem);
    font-weight: 900;
    line-height: 1;
    color: var(--bone);
    text-shadow: 0 0 60px rgba(196,18,48,0.25);
  }

  .feels-like {
    color: var(--ash);
    font-style: italic;
    font-size: 15px;
    margin-top: 8px;
  }

  .weather-icon-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .weather-icon {
    width: 80px;
    height: 80px;
    filter: sepia(1) hue-rotate(310deg) saturate(3) brightness(0.7) contrast(1.2);
    animation: iconFloat 4s ease-in-out infinite;
  }

  @keyframes iconFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .description {
    font-family: 'Crimson Text', serif;
    font-size: 20px;
    color: var(--bone);
    text-transform: capitalize;
    letter-spacing: 2px;
    font-style: italic;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: rgba(139,0,0,0.15);
    border: 1px solid rgba(139,0,0,0.15);
    margin-top: 10px;
  }

  .stat-item {
    background: var(--abyss);
    padding: 22px 24px;
    transition: background 0.2s;
  }

  .stat-item:hover {
    background: var(--dim);
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--blood);
    font-family: 'Cinzel Decorative', serif;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 22px;
    color: var(--bone);
    font-family: 'Crimson Text', serif;
  }

  .stat-unit {
    font-size: 13px;
    color: var(--ash);
    margin-left: 4px;
  }

  .forecast-section {
    margin-top: 2px;
    background: rgba(139,0,0,0.15);
  }

  .forecast-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--blood);
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid rgba(139,0,0,0.2);
  }

  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: rgba(139,0,0,0.1);
  }

  .forecast-day {
    background: var(--abyss);
    padding: 20px 10px;
    text-align: center;
    transition: background 0.2s;
  }

  .forecast-day:hover {
    background: var(--dim);
  }

  .forecast-dow {
    font-family: 'Cinzel Decorative', serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--ash);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .forecast-icon {
    width: 36px;
    height: 36px;
    filter: sepia(1) hue-rotate(310deg) saturate(3) brightness(0.6) contrast(1.2);
    margin: 0 auto 8px;
    display: block;
  }

  .forecast-temp {
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px;
    color: var(--bone);
  }

  .forecast-temp-min {
    font-size: 12px;
    color: var(--ash);
    margin-top: 3px;
  }

  .loading {
    text-align: center;
    padding: 60px;
    display: none;
  }

  .loading.visible {
    display: block;
  }

  .loading-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--blood);
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .loading-runes {
    font-size: 28px;
    color: var(--fog);
    letter-spacing: 20px;
    margin-bottom: 20px;
    animation: runeShift 2s ease-in-out infinite;
  }

  @keyframes runeShift {
    0%, 100% { opacity: 0.2; letter-spacing: 20px; }
    50% { opacity: 0.8; letter-spacing: 24px; }
  }

  footer {
    margin-top: 60px;
    text-align: center;
    color: var(--fog);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeUp 1s ease 0.6s both;
  }

  @keyframes glitch {
    0%, 90%, 100% { text-shadow: 0 0 60px rgba(196,18,48,0.4), 0 0 120px rgba(139,0,0,0.2); transform: skewX(0); }
    91% { text-shadow: 3px 0 rgba(255,34,68,0.8), -3px 0 rgba(0,100,255,0.4); transform: skewX(-2deg); }
    93% { text-shadow: -3px 0 rgba(255,34,68,0.8), 3px 0 rgba(0,100,255,0.4); transform: skewX(2deg); }
    95% { text-shadow: 0 0 60px rgba(196,18,48,0.4); transform: skewX(0); }
  }

  h1 {
    animation: glitch 8s infinite;
  }

  @media (max-width: 600px) {
    .card-main { padding: 30px 20px; }
    .forecast-grid { grid-template-columns: repeat(3, 1fr); }
    .main-info { gap: 20px; }
  }
</style>
</head>
<body>

<div class="grain"></div>
<div class="scanlines"></div>

<div class="container">
  <header>
    <span class="title-symbol">⸸ vazio eterno ⸸</span>
    <h1>VOID <span>CLIMA</span></h1>
    <p class="subtitle">O tempo nas trevas</p>
    <div class="divider"></div>
  </header>

  <div class="search-section">
    <div class="search-wrapper">
      <input type="text" id="cityInput" placeholder="Invoque uma cidade..." autocomplete="off" />
      <button onclick="fetchWeather()">Buscar</button>
    </div>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <div class="loading" id="loading">
    <div class="loading-runes">☽ ✦ ☾</div>
    <div class="loading-text">Consultando as trevas...</div>
  </div>

  <div class="weather-card" id="weatherCard">
    <div class="card-main">
      <div class="city-name" id="cityName">—</div>
      <div class="country-date" id="countryDate">—</div>

      <div class="main-info">
        <div class="temp-block">
          <div class="temperature" id="temperature">—°</div>
          <div class="feels-like" id="feelsLike">—</div>
        </div>
        <div class="weather-icon-wrap">
          <img class="weather-icon" id="weatherIcon" src="" alt="">
          <div class="description" id="description">—</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">Umidade</div>
          <div class="stat-value" id="humidity">—<span class="stat-unit">%</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Vento</div>
          <div class="stat-value" id="wind">—<span class="stat-unit">km/h</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Pressão</div>
          <div class="stat-value" id="pressure">—<span class="stat-unit">hPa</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Visibilidade</div>
          <div class="stat-value" id="visibility">—<span class="stat-unit">km</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Nuvens</div>
          <div class="stat-value" id="clouds">—<span class="stat-unit">%</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Nascer do Sol</div>
          <div class="stat-value" id="sunrise">—</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Pôr do Sol</div>
          <div class="stat-value" id="sunset">—</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Mín / Máx</div>
          <div class="stat-value" id="minmax">—</div>
        </div>
      </div>
    </div>

    <div class="forecast-section">
      <div class="forecast-title">Próximos 5 Dias</div>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>
  </div>

  <footer>⸸ o céu nunca mente ⸸</footer>
</div>

<script>
  const API_KEY = 'eba0ca7abead12061cbcbefc75ac2dda';

  const input = document.getElementById('cityInput');
  const errorMsg = document.getElementById('errorMsg');
  const loading = document.getElementById('loading');
  const card = document.getElementById('weatherCard');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchWeather(); });

  function showError(msg) {
    errorMsg.textContent = msg;
    loading.classList.remove('visible');
    card.classList.remove('visible');
  }

  function formatTime(unix, offset) {
    const d = new Date((unix + offset) * 1000);
    return d.toUTCString().slice(17, 22);
  }

  function getDayName(dateStr) {
    const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    return days[new Date(dateStr).getDay()];
  }

  async function fetchWeather() {
    const city = input.value.trim();
    if (!city) return;

    errorMsg.textContent = '';
    card.classList.remove('visible');
    loading.classList.add('visible');

    try {
      const [currentRes, forecastRes] = await Promise.all([
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=pt_br`),
        fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=pt_br`)
      ]);

      if (!currentRes.ok) {
        showError('Cidade não encontrada nas trevas.');
        return;
      }

      const current = await currentRes.json();
      const forecast = await forecastRes.json();

      const offset = current.timezone;
      const now = new Date();
      const dateStr = now.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      document.getElementById('cityName').textContent = current.name;
      document.getElementById('countryDate').textContent = `${current.sys.country} — ${dateStr}`;
      document.getElementById('temperature').textContent = `${Math.round(current.main.temp)}°`;
      document.getElementById('feelsLike').textContent = `Sensação: ${Math.round(current.main.feels_like)}°C`;
      document.getElementById('description').textContent = current.weather[0].description;
      document.getElementById('weatherIcon').src = `https://openweathermap.org/img/wn/${current.weather[0].icon}@2x.png`;
      document.getElementById('humidity').innerHTML = `${current.main.humidity}<span class="stat-unit">%</span>`;
      document.getElementById('wind').innerHTML = `${Math.round(current.wind.speed * 3.6)}<span class="stat-unit">km/h</span>`;
      document.getElementById('pressure').innerHTML = `${current.main.pressure}<span class="stat-unit">hPa</span>`;
      document.getElementById('visibility').innerHTML = `${(current.visibility / 1000).toFixed(1)}<span class="stat-unit">km</span>`;
      document.getElementById('clouds').innerHTML = `${current.clouds.all}<span class="stat-unit">%</span>`;
      document.getElementById('sunrise').textContent = formatTime(current.sys.sunrise, offset);
      document.getElementById('sunset').textContent = formatTime(current.sys.sunset, offset);
      document.getElementById('minmax').innerHTML = `${Math.round(current.main.temp_min)}° <span class="stat-unit">/</span> ${Math.round(current.main.temp_max)}°`;

      const dailyMap = {};
      forecast.list.forEach(item => {
        const date = item.dt_txt.split(' ')[0];
        if (!dailyMap[date]) dailyMap[date] = [];
        dailyMap[date].push(item);
      });

      const days = Object.keys(dailyMap).slice(0, 5);
      const fg = document.getElementById('forecastGrid');
      fg.innerHTML = '';

      days.forEach(date => {
        const entries = dailyMap[date];
        const temps = entries.map(e => e.main.temp);
        const maxTemp = Math.round(Math.max(...temps));
        const minTemp = Math.round(Math.min(...temps));
        const midEntry = entries[Math.floor(entries.length / 2)];
        const icon = midEntry.weather[0].icon;

        const div = document.createElement('div');
        div.className = 'forecast-day';
        div.innerHTML = `
          <div class="forecast-dow">${getDayName(date + 'T12:00:00')}</div>
          <img class="forecast-icon" src="https://openweathermap.org/img/wn/${icon}.png" alt="">
          <div class="forecast-temp">${maxTemp}°</div>
          <div class="forecast-temp-min">${minTemp}°</div>
        `;
        fg.appendChild(div);
      });

      loading.classList.remove('visible');
      card.classList.add('visible');

    } catch (err) {
      showError('Erro ao invocar os dados das trevas.');
    }
  }
</script>
</body>
</html>
